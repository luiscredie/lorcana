document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{{ setup.show }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:#1A1712;border:1px solid #2c261e;border-radius:20px;padding:26px 26px 30px;max-width:640px;margin:6vh auto 0;box-shadow:0 30px 60px -30px #000\">\n        <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:1.3rem;margin-bottom:5px\">Set the table<\u002Fdiv>\n        <p style=\"color:#A99C84;font-size:.86rem;line-height:1.55;margin:0 0 20px\">A single-turn-structured vanilla engine: ink, play characters, quest and challenge. Abilities and keywords are ignored for now — this is the rules skeleton. First to 20 lore wins.<\u002Fp>\n\n        <label style=\"display:block;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:#8B7A63;margin-bottom:6px\">Your deck<\u002Flabel>\n        <sc-raw-select value=\"{{ setup.humanId }}\" onchange=\"{{ setup.onHuman }}\" style=\"width:100%;border:1px solid #3a342b;background:#12100E;color:#F1EBDD;border-radius:11px;padding:11px 13px;font-family:inherit;font-size:.9rem;margin-bottom:16px\">\n          <sc-for list=\"{{ setup.decks }}\" as=\"d\" hint-placeholder-count=\"3\"><option value=\"{{ d.id }}\">{{ d.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fsc-raw-select>\n\n        <label style=\"display:block;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:#8B7A63;margin-bottom:6px\">Opponent deck (auto-piloted)<\u002Flabel>\n        <sc-raw-select value=\"{{ setup.oppId }}\" onchange=\"{{ setup.onOpp }}\" style=\"width:100%;border:1px solid #3a342b;background:#12100E;color:#F1EBDD;border-radius:11px;padding:11px 13px;font-family:inherit;font-size:.9rem;margin-bottom:20px\">\n          <sc-for list=\"{{ setup.decks }}\" as=\"d\" hint-placeholder-count=\"3\"><option value=\"{{ d.id }}\">{{ d.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fsc-raw-select>\n\n        <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n          <button onclick=\"{{ setup.onStart }}\" style=\"border:0;background:#CC785C;color:#fff;border-radius:12px;padding:12px 24px;font-family:inherit;font-weight:700;font-size:.92rem;cursor:pointer\">Start match<\u002Fbutton>\n          <span style=\"font-size:.76rem;color:#8B7A63\">{{ setup.hint }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- GAME -->\n    <sc-if value=\"{{ game.show }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid;grid-template-columns:1fr 240px;gap:16px;align-items:start\">\n\n        <!-- BOARD COLUMN -->\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n\n          <!-- Opponent -->\n          <div style=\"background:#191510;border:1px solid #2c261e;border-radius:16px;padding:12px 14px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px\">\n              <div style=\"display:flex;align-items:center;gap:9px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ game.opp.dot }};display:block\"><\u002Fspan>\n                <span style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.95rem\">{{ game.opp.name }}<\u002Fspan>\n                <span style=\"font-family:'Space Mono',monospace;font-size:.66rem;color:#8B7A63\">hand {{ game.opp.hand }} · deck {{ game.opp.deck }} · ink {{ game.opp.ink }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1.4rem;color:{{ game.opp.loreColor }}\">{{ game.opp.lore }}<span style=\"font-size:.7rem;color:#8B7A63;font-weight:500\"> /20<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"sim-scroll\" style=\"display:flex;gap:8px;overflow-x:auto;min-height:104px;padding-bottom:4px;align-items:stretch\">\n              <sc-if value=\"{{ game.opp.empty }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#5f5648;font-size:.78rem;align-self:center;padding:0 6px\">No characters in play.<\u002Fspan><\u002Fsc-if>\n              <sc-for list=\"{{ game.opp.play }}\" as=\"c\" hint-placeholder-count=\"0\">\n                <button onclick=\"{{ c.onClick }}\" onmouseenter=\"{{ c.onEnter }}\" onmouseleave=\"{{ c.onLeave }}\" style=\"{{ c.style }}\">\n                  <span style=\"{{ c.costStyle }}\">{{ c.cost }}<\u002Fspan>\n                  <span style=\"display:block;height:44px;margin:-1px -1px 4px;border-radius:8px 8px 3px 3px;overflow:hidden;background:#0d0b09;position:relative\">\n                    <img src=\"{{ c.img }}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\" style=\"width:100%;height:100%;object-fit:cover;object-position:top center;display:block\">\n                  <\u002Fspan>\n                  <span style=\"font-size:.66rem;font-weight:700;line-height:1.15;text-align:left;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical\">{{ c.name }}<\u002Fspan>\n                  <span style=\"display:flex;justify-content:space-between;align-items:center;margin-top:auto\">\n                    <span style=\"font-family:'Space Mono',monospace;font-size:.62rem;color:#E8C9A0\">{{ c.sw }}<\u002Fspan>\n                    <span style=\"font-family:'Space Mono',monospace;font-size:.6rem;color:#D8B98F\">◆{{ c.lore }}<\u002Fspan>\n                  <\u002Fspan>\n                  <sc-if value=\"{{ c.hasKw }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ c.kwStyle }}\">{{ c.kwLabel }}<\u002Fspan><\u002Fsc-if>\n                  <span style=\"{{ c.tagStyle }}\">{{ c.tag }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Center bar -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;background:#211c15;border:1px solid #322a20;border-radius:13px;padding:10px 16px\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#B49B76\">Turn {{ game.turn }} · {{ game.phaseLabel }}<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk';font-size:.82rem;color:#CBBEA6;flex:1;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis\">{{ game.banner }}<\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <sc-if value=\"{{ game.challenging }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ game.onCancelChallenge }}\" style=\"border:1px solid #6a4a44;background:#2a1c19;color:#E7A08F;border-radius:10px;padding:8px 14px;font-family:inherit;font-weight:700;font-size:.8rem;cursor:pointer\">Cancel attack<\u002Fbutton>\n              <\u002Fsc-if>\n              <button onclick=\"{{ game.onEndTurn }}\" style=\"{{ game.endStyle }}\">{{ game.endLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- You -->\n          <div style=\"background:#191510;border:1px solid #2c261e;border-radius:16px;padding:12px 14px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px\">\n              <div style=\"display:flex;align-items:center;gap:9px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ game.you.dot }};display:block\"><\u002Fspan>\n                <span style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.95rem\">{{ game.you.name }}<\u002Fspan>\n                <span style=\"font-family:'Space Mono',monospace;font-size:.66rem;color:#8B7A63\">deck {{ game.you.deck }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1.4rem;color:{{ game.you.loreColor }}\">{{ game.you.lore }}<span style=\"font-size:.7rem;color:#8B7A63;font-weight:500\"> /20<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- your play zone -->\n            <div class=\"sim-scroll\" style=\"display:flex;gap:8px;overflow-x:auto;min-height:104px;padding-bottom:4px;align-items:stretch\">\n              <sc-if value=\"{{ game.you.empty }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:#5f5648;font-size:.78rem;align-self:center;padding:0 6px\">Play characters from your hand below.<\u002Fspan><\u002Fsc-if>\n              <sc-for list=\"{{ game.you.play }}\" as=\"c\" hint-placeholder-count=\"0\">\n                <div onmouseenter=\"{{ c.onEnter }}\" onmouseleave=\"{{ c.onLeave }}\" style=\"position:relative;flex:0 0 auto\">\n                  <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">\n                    <span style=\"{{ c.costStyle }}\">{{ c.cost }}<\u002Fspan>\n                    <span style=\"display:block;height:44px;margin:-1px -1px 4px;border-radius:8px 8px 3px 3px;overflow:hidden;background:#0d0b09;position:relative\">\n                      <img src=\"{{ c.img }}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\" style=\"width:100%;height:100%;object-fit:cover;object-position:top center;display:block\">\n                    <\u002Fspan>\n                    <span style=\"font-size:.66rem;font-weight:700;line-height:1.15;text-align:left;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical\">{{ c.name }}<\u002Fspan>\n                    <span style=\"display:flex;justify-content:space-between;align-items:center;margin-top:auto\">\n                      <span style=\"font-family:'Space Mono',monospace;font-size:.62rem;color:#E8C9A0\">{{ c.sw }}<\u002Fspan>\n                      <span style=\"font-family:'Space Mono',monospace;font-size:.6rem;color:#D8B98F\">◆{{ c.lore }}<\u002Fspan>\n                    <\u002Fspan>\n                    <sc-if value=\"{{ c.hasKw }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ c.kwStyle }}\">{{ c.kwLabel }}<\u002Fspan><\u002Fsc-if>\n                    <span style=\"{{ c.tagStyle }}\">{{ c.tag }}<\u002Fspan>\n                  <\u002Fbutton>\n                  <sc-if value=\"{{ c.showMenu }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"position:absolute;left:50%;top:100%;transform:translateX(-50%);margin-top:5px;z-index:20;width:118px;background:#241d16;border:1px solid #3a342b;border-radius:9px;padding:5px;display:flex;flex-direction:column;gap:4px;box-shadow:0 12px 24px -10px #000\">\n                      <div style=\"display:flex;gap:4px\">\n                        <button onclick=\"{{ c.onQuest }}\" style=\"{{ c.questStyle }}\" title=\"Quest for lore (Q)\">Quest·Q<\u002Fbutton>\n                        <button onclick=\"{{ c.onChallenge }}\" style=\"{{ c.chalStyle }}\" title=\"Challenge an exerted enemy (C)\">Chal·C<\u002Fbutton>\n                      <\u002Fdiv>\n                      <sc-for list=\"{{ c.abils }}\" as=\"a\" hint-placeholder-count=\"0\">\n                        <button onclick=\"{{ a.onClick }}\" style=\"{{ a.style }}\" title=\"{{ a.title }}\">{{ a.key }} · {{ a.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- ink bar -->\n            <div style=\"display:flex;align-items:center;gap:10px;margin:11px 0 9px;padding:7px 11px;background:#12100E;border:1px solid #2c261e;border-radius:11px\">\n              <span style=\"font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:#8B7A63\">Inkwell<\u002Fspan>\n              <span style=\"font-family:'Chakra Petch';font-weight:700;font-size:1.05rem;color:#7FB3E8\">{{ game.you.inkAvail }}<\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-size:.68rem;color:#8B7A63\">available · {{ game.you.inkTotal }} total<\u002Fspan>\n              <span style=\"margin-left:auto;font-family:'Space Mono',monospace;font-size:.66rem;color:{{ game.you.inkedColor }}\">{{ game.you.inkedLabel }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- hand -->\n            <div style=\"font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:#8B7A63;margin-bottom:6px\">Hand · {{ game.you.handCount }}<\u002Fdiv>\n            <div class=\"sim-scroll\" style=\"display:flex;gap:8px;overflow-x:auto;min-height:120px;padding-bottom:4px;align-items:stretch\">\n              <sc-if value=\"{{ game.you.handEmpty }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#5f5648;font-size:.78rem;align-self:center;padding:0 6px\">Empty hand.<\u002Fspan><\u002Fsc-if>\n              <sc-for list=\"{{ game.you.hand }}\" as=\"c\" hint-placeholder-count=\"0\">\n                <div style=\"{{ c.wrapStyle }}\" onmouseenter=\"{{ c.onEnter }}\" onmouseleave=\"{{ c.onLeave }}\">\n                  <div style=\"{{ c.style }}\">\n                    <span style=\"{{ c.costStyle }}\">{{ c.cost }}<\u002Fspan>\n                    <span style=\"display:block;height:40px;margin:-1px -1px 4px;border-radius:8px 8px 3px 3px;overflow:hidden;background:#0d0b09;position:relative\">\n                      <img src=\"{{ c.img }}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\" style=\"width:100%;height:100%;object-fit:cover;object-position:top center;display:block\">\n                    <\u002Fspan>\n                    <span style=\"font-size:.66rem;font-weight:700;line-height:1.15;text-align:left;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical\">{{ c.name }}<\u002Fspan>\n                    <span style=\"font-family:'Space Mono',monospace;font-size:.58rem;color:#B49B76;margin-top:auto\">{{ c.line }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:4px;margin-top:5px\">\n                    <button onclick=\"{{ c.onPlay }}\" style=\"{{ c.playStyle }}\">Play<\u002Fbutton>\n                    <button onclick=\"{{ c.onInk }}\" style=\"{{ c.inkStyle }}\" title=\"Add to inkwell\">Ink<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- LOG COLUMN -->\n        <div style=\"background:#161310;border:1px solid #2c261e;border-radius:16px;padding:12px 12px;position:sticky;top:14px;max-height:82vh;display:flex;flex-direction:column\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:#8B7A63;margin-bottom:8px\">Game log<\u002Fdiv>\n          <div class=\"sim-scroll\" style=\"overflow-y:auto;display:flex;flex-direction:column;gap:5px\">\n            <sc-for list=\"{{ game.log }}\" as=\"l\" hint-placeholder-count=\"4\">\n              <div style=\"font-size:.72rem;line-height:1.4;color:{{ l.color }};padding:5px 8px;background:{{ l.bg }};border-radius:7px\">{{ l.text }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MULLIGAN -->\n      <sc-if value=\"{{ game.mulligan.show }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;inset:0;z-index:65;background:rgba(10,8,6,.82);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:24px\">\n          <div style=\"background:#1B1712;border:1px solid #3a342b;border-radius:20px;padding:24px 26px 26px;max-width:760px;width:100%;box-shadow:0 30px 70px -20px #000;animation:simPop .2s ease\">\n            <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1.35rem;margin-bottom:4px\">Alter your opening hand<\u002Fdiv>\n            <p style=\"color:#A99C84;font-size:.85rem;line-height:1.5;margin:0 0 18px\">Click any cards you want to shuffle back and redraw. Hover a card to read it. Then confirm — you draw the same number you put back.<\u002Fp>\n            <div style=\"display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px\">\n              <sc-for list=\"{{ game.mulligan.cards }}\" as=\"m\" hint-placeholder-count=\"7\">\n                <div onclick=\"{{ m.onToggle }}\" onmouseenter=\"{{ m.onEnter }}\" onmouseleave=\"{{ m.onLeave }}\" style=\"{{ m.style }}\">\n                  <span style=\"{{ m.badgeStyle }}\">{{ m.badge }}<\u002Fspan>\n                  <img src=\"{{ m.img }}\" alt=\"\" loading=\"lazy\" onerror=\"this.style.display='none'\" style=\"width:100%;height:100%;object-fit:cover;display:block\">\n                  <sc-if value=\"{{ m.noImg }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;font-size:.72rem;font-weight:700;color:#CBBEA6\">{{ m.name }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:center\">\n              <button onclick=\"{{ game.mulligan.onConfirm }}\" style=\"border:0;background:#CC785C;color:#fff;border-radius:12px;padding:12px 26px;font-family:inherit;font-weight:700;font-size:.92rem;cursor:pointer\">{{ game.mulligan.confirmLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- HOVER PREVIEW -->\n      <sc-if value=\"{{ game.preview.show }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;top:50%;left:20px;transform:translateY(-50%);z-index:70;width:210px;background:#1B1712;border:1px solid #3a342b;border-radius:16px;padding:10px;box-shadow:0 26px 60px -18px #000;animation:simPop .12s ease\">\n          <div style=\"border-radius:11px;overflow:hidden;background:#0d0b09;aspect-ratio:5/7;position:relative;pointer-events:none\">\n            <img src=\"{{ game.preview.img }}\" alt=\"\" onerror=\"this.style.display='none'\" style=\"width:100%;height:100%;object-fit:cover;display:block\">\n            <sc-if value=\"{{ game.preview.noImg }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;font-family:'Chakra Petch';font-weight:600;font-size:1rem;color:#CBBEA6\">{{ game.preview.name }}<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ game.preview.hasActions }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-top:9px\">\n              <sc-for list=\"{{ game.preview.actions }}\" as=\"a\" hint-placeholder-count=\"2\">\n                <button onclick=\"{{ a.onClick }}\" style=\"{{ a.style }}\">{{ a.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- WIN OVERLAY -->\n      <sc-if value=\"{{ game.over }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:fixed;inset:0;z-index:60;background:rgba(10,8,6,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px\">\n          <div style=\"background:#1B1712;border:1px solid #3a342b;border-radius:20px;padding:34px 40px;text-align:center;box-shadow:0 30px 70px -20px #000;animation:simPop .25s ease\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:#8B7A63;margin-bottom:8px\">Match complete<\u002Fdiv>\n            <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:2rem;color:{{ game.winColor }};margin-bottom:6px\">{{ game.winTitle }}<\u002Fdiv>\n            <div style=\"color:#A99C84;font-size:.9rem;margin-bottom:22px\">{{ game.winSub }}<\u002Fdiv>\n            <button onclick=\"{{ onNewGame }}\" style=\"border:0;background:#CC785C;color:#fff;border-radius:12px;padding:12px 26px;font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer\">Play again<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = { G:null, setupHuman:'', setupOpp:'', err:'', focusUid:null, preview:null };\n\n  // ---------- setup / persistence ----------\n  GKEY='lorcanaSim_game_v1';\n  IMG_BASE='https://luiscredie.github.io/lorcana/Lorcana%20Cards%20Named/';\n  TREE_API='https://api.github.com/repos/luiscredie/lorcana/git/trees/main?recursive=1';\n  loadTree(){\n    let cached=null;\n    try{ cached=JSON.parse(localStorage.getItem('lorcanaAtlas_fileTree_v2')); }catch(e){}\n    if(cached&&cached.multi){ this._tree=cached.multi; }\n    const fresh=cached&&cached.multi&&(Date.now()-(cached.t||0))<24*3600*1000;\n    if(fresh||this._treeLoading) return;\n    this._treeLoading=true;\n    const prefix='Lorcana Cards Named/'; const multi={};\n    fetch(this.TREE_API).then(r=>r.ok?r.json():null).then(j=>{\n      if(!j||!Array.isArray(j.tree)) throw new Error('bad');\n      j.tree.forEach(node=>{\n        if(!node||node.type!=='blob'||typeof node.path!=='string') return;\n        if(node.path.indexOf(prefix)!==0) return;\n        const file=node.path.slice(prefix.length);\n        const base=file.replace(/\\.[a-z0-9]+$/i,'');\n        const m=base.match(/^.+? - .+? - (.+)$/); const nm=m?m[1]:base;\n        const k=this.colKey(nm); (multi[k]=multi[k]||[]).push(file);\n      });\n      this._tree=multi;\n      try{ localStorage.setItem('lorcanaAtlas_fileTree_v2', JSON.stringify({t:Date.now(), multi})); }catch(e){}\n      this._treeLoading=false; this.forceUpdate();\n    }).catch(()=>{ this._treeLoading=false; });\n  }\n  // Your manual inkable corrections from the dashboard (merged across accounts).\n  loadInk(){ const m={}; try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(!/^lorcanaAtlas_inkable_v1(__|$)/.test(k)) continue; const o=JSON.parse(localStorage.getItem(k)); if(o&&typeof o==='object') Object.keys(o).forEach(ck=>{ if(o[ck]===0||o[ck]===1) m[ck]=o[ck]; }); } }catch(e){} this._ink=m; }\n  effInk(key, baseIk){ const o=this._ink&&this._ink[key]; return (o===0||o===1)?o:baseIk; }\n  SYNC_URL='https://lorcana.luis-credie.workers.dev';\n  session(){ try{ const s=JSON.parse(localStorage.getItem('lorcanaAtlas_admin_v1')); return (s&&s.token&&s.exp&&Date.now()<s.exp)?s:null; }catch(e){ return null; } }\n  safeUserKey(u){ return String(u||'').toLowerCase().replace(/[^a-z0-9_-]/g,''); }\n  // Pull the live atlas document (inkable overrides + decks) straight from the database,\n  // so the sim doesn't depend on the dashboard having synced localStorage on this device.\n  async loadFromDB(){\n    const s=this.session(); if(!s) return;\n    let doc=null;\n    try{\n      const r=await fetch(this.SYNC_URL+'?_='+Date.now(), {headers:{'Accept':'application/json','Authorization':'Bearer '+s.token}, cache:'no-store'});\n      if(r.ok){ let j=await r.json().catch(()=>null); if(j&&typeof j.content==='string'){ try{ j=JSON.parse(j.content); }catch(e){} } if(j&&(j.inkable||j.lib||j.store)) doc=j; }\n    }catch(e){}\n    if(!doc){\n      try{\n        const key=this.safeUserKey(s.user);\n        const path=key==='luiscredie'?'atlas-data.json':('data/'+(key||'user')+'.json');\n        const r=await fetch(path+'?_='+Date.now(), {cache:'no-store'});\n        if(r.ok){ doc=await r.json().catch(()=>null); if(doc&&typeof doc.content==='string'){ try{ doc=JSON.parse(doc.content); }catch(e){} } }\n      }catch(e){}\n    }\n    if(!doc) return;\n    let changed=false;\n    if(doc.inkable&&typeof doc.inkable==='object'){\n      Object.keys(doc.inkable).forEach(k=>{ const v=doc.inkable[k]; if((v===0||v===1)&&this._ink[k]!==v){ this._ink[k]=v; changed=true; } });\n      try{ localStorage.setItem('lorcanaAtlas_inkable_v1', JSON.stringify(this._ink)); }catch(e){}\n    }\n    if(Array.isArray(doc.lib)&&doc.lib.length){\n      try{ localStorage.setItem('lorcanaAtlas_decks_v1__'+this.safeUserKey(s.user), JSON.stringify(doc.lib)); }catch(e){}\n      changed=true;\n    }\n    if(changed && !this.state.G) this.forceUpdate();\n  }\n  imgUrl(meta){\n    if(!meta) return '';\n    const k=this.colKey(meta.n);\n    // Only trust the repo file tree — the DB's setNum/num point at a different printing\n    // and would 404. Until the tree loads, return '' so no broken request fires.\n    if(this._tree && this._tree[k] && this._tree[k].length){\n      const files=this._tree[k].slice().sort();\n      return this.IMG_BASE+encodeURIComponent(files[0]);\n    }\n    return '';\n  }\n  cardImg(c){ return this.imgUrl(this.db()[c.key]||{n:c.n,setNum:c.setNum,num:c.num}); }\n  setPrev(c){ this.setState({preview:this.previewObj(c)}); }\n  clearPrev(){ if(this.state.preview) this.setState({preview:null}); }\n  previewObj(c){\n    const m=this.db()[c.key]||{};\n    const dmg=c.damage||0;\n    const G=this.state.G;\n    const mine = !!(G && G.players[0].play.find(x=>x.uid===c.uid));\n    const ready = mine && c.t==='Character' && !c.exerted && (!c.sick || (c.kw&&c.kw.rush));\n    const abis = mine ? this.parseAbilities(c) : [];\n    const av = G ? this.inkAvail(G.players[0]) : 0;\n    const mBtn=(on)=>`flex:1;min-width:70px;border:0;border-radius:8px;padding:9px 6px;font-family:'Space Mono',monospace;font-weight:700;font-size:.66rem;letter-spacing:.02em;cursor:${on?'pointer':'not-allowed'};background:${on?'rgba(204,120,92,.95)':'rgba(60,52,42,.85)'};color:${on?'#fff':'#8b8172'}`;\n    const actions=[];\n    if(mine && c.t==='Character'){\n      const canQuest = ready && !(c.kw&&c.kw.reckless);\n      actions.push({label:'Quest (Q)', style:mBtn(canQuest), onClick:()=>this.humanQuest(c.uid)});\n      actions.push({label:'Challenge (C)', style:mBtn(ready), onClick:()=>this.startChallenge(c.uid)});\n      abis.forEach((a,i)=>{ const on=ready&&a.supported&&av>=(a.inkCost||0); actions.push({label:(i+1)+' · '+(a.name.length>16?a.name.slice(0,15)+'…':a.name), style:mBtn(on), onClick:()=>this.activateAbility(c.uid,i)}); });\n    }\n    return { name:c.n, img:this.cardImg(c), noImg:!this.cardImg(c),\n      tx:(m.tx||'').replace(/\\{e\\}/g,'⟳').replace(/\\{i\\}/g,'⬡').replace(/\\{s\\}/g,'¤').replace(/\\{l\\}/g,'◆').replace(/\\{w\\}/g,'♥'),\n      cost:c.c, type:c.t, ink:c.i||'',\n      isChar:c.t==='Character', s:this.str(c), w:c.w, wRem:Math.max(0,(c.w||0)-dmg), lore:c.l,\n      dot:this.INKDOT[c.i]||'#8A97A6', inkable:this.effInk(c.key,c.ik)===1,\n      actions, hasActions:actions.length>0 };\n  }\n  componentDidMount(){\n    let G=null;\n    try{ const raw=localStorage.getItem(this.GKEY); if(raw) G=JSON.parse(raw); }catch(e){}\n    const decks=this.decks();\n    const first=decks[0]?decks[0].id:'';\n    this.loadTree(); this.loadInk();\n    this._key=(e)=>this.onKey(e);\n    window.addEventListener('keydown', this._key);\n    this.setState({ G, setupHuman:this.state.setupHuman||first, setupOpp:this.state.setupOpp||first });\n    this.loadFromDB();\n  }\n  componentWillUnmount(){ if(this._key) window.removeEventListener('keydown', this._key); }\n  saveG(G){ try{ localStorage.setItem(this.GKEY, JSON.stringify(G)); }catch(e){} }\n  db(){ return (typeof window!=='undefined'&&window.LORCANA_CARD_DB)||{}; }\n  colKey(n){ return String(n||'').normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').toLowerCase().replace(/[\\u2018\\u2019\\u02BC]/g,\"'\").replace(/[\\\\/:*?\"<>|]/g,'').replace(/\\s+/g,' ').trim().replace(/4\\s*-?\\s*town\\b/g,'4town'); }\n\n  // Pull decks saved by the dashboard (any account namespace), else a generated sample.\n  decks(){\n    const out=[]; const seen={};\n    try{\n      for(let i=0;i<localStorage.length;i++){\n        const key=localStorage.key(i);\n        if(!/^lorcanaAtlas_decks_v1__/.test(key)) continue;\n        const arr=JSON.parse(localStorage.getItem(key));\n        if(!Array.isArray(arr)) continue;\n        arr.forEach(d=>{\n          if(!d||!d.cards||!d.cards.length) return;\n          const id='saved:'+d.id; if(seen[id]) return; seen[id]=1;\n          out.push({id, label:(d.title||'Deck')+' · '+d.cards.reduce((x,l)=>x+(parseInt(l,10)||0),0)+' cards', cards:d.cards.slice()});\n        });\n      }\n    }catch(e){}\n    const sample=this.sampleDeck();\n    if(sample) out.push(sample);\n    return out.length?out:(sample?[sample]:[]);\n  }\n  sampleDeck(){\n    const db=this.db(); const keys=Object.keys(db);\n    if(!keys.length) return null;\n    // cheap-ish inkable characters, spread across cost, two inks\n    const chars=keys.map(k=>db[k]).filter(c=>c.t==='Character'&&c.ik===1&&c.s!=null&&c.w!=null&&c.c!=null&&c.l!=null);\n    const byInk={};\n    chars.forEach(c=>{ const ink=(c.i||'').split(/[\\s,\\/]+/)[0]; (byInk[ink]=byInk[ink]||[]).push(c); });\n    const inks=Object.keys(byInk).sort((a,b)=>byInk[b].length-byInk[a].length).slice(0,2);\n    let pool=[]; inks.forEach(ik=>{ pool=pool.concat(byInk[ik]); });\n    pool.sort((a,b)=>a.c-b.c);\n    const pick=[]; const step=Math.max(1,Math.floor(pool.length/15));\n    for(let i=0;i<pool.length&&pick.length<15;i+=step) pick.push(pool[i]);\n    if(pick.length<15) return null;\n    const cards=pick.map(c=>'4 '+c.n);\n    return {id:'sample', label:'Sample deck (auto-built) · 60 cards', cards};\n  }\n\n  expandDeck(cards){\n    const db=this.db(); const out=[]; let uid=0;\n    (cards||[]).forEach(line=>{\n      const m=String(line).trim().match(/^(\\d+)\\s*x?\\s+(.+)$/i);\n      if(!m) return; const qty=parseInt(m[1],10)||0; const name=m[2].trim();\n      const meta=db[this.colKey(name)];\n      if(!meta) return;\n      for(let i=0;i<qty;i++) out.push(this.mkCard(meta,'u'+(uid++)));\n    });\n    return out;\n  }\n  mkCard(meta,uid){ const key=this.colKey(meta.n); return {uid, key, n:meta.n, c:meta.c, i:(meta.i||'').split(/[\\s,\\/]+/)[0], t:meta.t, ik:this.effInk(key, meta.ik), s:meta.s, w:meta.w, l:meta.l, tx:meta.tx||'', kw:this.parseKeywords(meta.tx||''), exerted:false, damage:0, sick:false, buff:0}; }\n  // Detect combat-relevant keywords from card text.\n  parseKeywords(tx){\n    const t=String(tx||''); const low=t.toLowerCase();\n    const kw={};\n    if(/\\brush\\b/.test(low)) kw.rush=true;\n    if(/\\bevasive\\b/.test(low)) kw.evasive=true;\n    if(/\\bbodyguard\\b/.test(low)) kw.bodyguard=true;\n    if(/\\bward\\b/.test(low)) kw.ward=true;\n    if(/\\breckless\\b/.test(low)) kw.reckless=true;\n    let m=low.match(/challenger \\+?(\\d+)/); if(m) kw.challenger=+m[1];\n    m=low.match(/resist \\+?(\\d+)/); if(m) kw.resist=+m[1];\n    m=low.match(/\\bsinger (\\d+)/); if(m) kw.singer=+m[1];\n    if(/\\bshift\\b/.test(low)) kw.shift=true;\n    return kw;\n  }\n  // Is defender a legal challenge target given attacker + board (Evasive/Bodyguard)?\n  canChallengeTarget(attacker, defender, defside){\n    if(!defender.exerted) return {ok:false, why:'You can only challenge exerted characters.'};\n    if(defender.kw&&defender.kw.evasive && !(attacker.kw&&attacker.kw.evasive)) return {ok:false, why:defender.n+' has Evasive — only Evasive characters can challenge it.'};\n    const guards=defside.play.filter(x=>x.t==='Character'&&x.exerted&&x.kw&&x.kw.bodyguard);\n    if(guards.length && !(defender.kw&&defender.kw.bodyguard)) return {ok:false, why:'A Bodyguard must be challenged first.'};\n    return {ok:true};\n  }\n  dmgTo(target, raw){ const r=(target.kw&&target.kw.resist)||0; return Math.max(0, raw-r); }\n  atkStrength(c){ return this.str(c)+((c.kw&&c.kw.challenger)||0); }\n\n  // ---- ability parsing (activated abilities that cost {e}) ----\n  parseAbilities(card){\n    const tx=(card.tx||'').replace(/\\{i\\}/g,'⬡').replace(/\\{e\\}/g,'⟳').replace(/\\{s\\}/g,'¤').replace(/\\{l\\}/g,'◆');\n    const out=[];\n    tx.split('\\n').forEach(line=>{\n      const L=line.trim(); if(!L||L.indexOf('⟳')<0) return;\n      // must be an activated (exert) ability with a dash separator\n      const m=L.match(/^(?:([A-Z][A-Z0-9 '!,.&-]{2,}?)\\s+)?((?:\\d+\\s*)?⬡?\\s*⟳(?:\\s*,\\s*\\d+\\s*⬡)?)\\s*[—–-]\\s*(.+)$/);\n      if(!m) return;\n      const name=(m[1]||'Ability').trim();\n      const costRaw=m[2]||'';\n      const inkM=costRaw.match(/(\\d+)\\s*⬡/); const inkCost=inkM?parseInt(inkM[1],10):0;\n      const effect=m[3].trim();\n      const parsed=this.parseEffect(effect);\n      out.push({name, inkCost, effect, needsTarget:parsed.needsTarget, targetSide:parsed.targetSide, kind:parsed.kind, amount:parsed.amount, supported:parsed.kind!=null});\n    });\n    return out.slice(0,2);\n  }\n  parseEffect(eff){\n    const e=eff.toLowerCase();\n    let m;\n    if(m=e.match(/gain (\\d+) ◆|gain (\\d+) lore/)) return {kind:'lore', amount:+((m[1]||m[2])), needsTarget:false};\n    if(m=e.match(/draw (\\d+) cards?|draw a card/)) return {kind:'draw', amount:m[1]?+m[1]:1, needsTarget:false};\n    if(m=e.match(/deal (\\d+) damage/)) return {kind:'damage', amount:+m[1], needsTarget:true, targetSide:'any'};\n    if(/banish chosen (character|item)/.test(e)) return {kind:'banish', needsTarget:true, targetSide:'any'};\n    if(/ready this character/.test(e)) return {kind:'readySelf', needsTarget:false};\n    if(/ready chosen character/.test(e)) return {kind:'readyTarget', needsTarget:true, targetSide:'mine'};\n    if(m=e.match(/chosen character gets \\+(\\d+) ¤|chosen character gets \\+(\\d+) .?strength/)) return {kind:'buff', amount:+((m[1]||m[2])), needsTarget:true, targetSide:'any'};\n    if(m=e.match(/this character gets \\+(\\d+) ¤/)) return {kind:'buffSelf', amount:+m[1], needsTarget:false};\n    return {kind:null, needsTarget:false};\n  }\n  shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }\n\n  mkPlayer(name, cards){\n    const deck=this.shuffle(this.expandDeck(cards));\n    const hand=deck.splice(0,7);\n    return {name, deck, hand, inkwell:[], play:[], discard:[], lore:0, inkUsed:0, inkedThisTurn:false};\n  }\n  INKDOT={Amber:'#E5A93B',Amethyst:'#9C6BC9',Emerald:'#3E9E6A',Ruby:'#CB4B4B',Sapphire:'#4B84CB',Steel:'#8A97A6'};\n  menuBtn(on){ return `flex:1;border:0;border-radius:6px;padding:5px 4px;font-family:'Space Mono',monospace;font-weight:700;font-size:.6rem;letter-spacing:.02em;cursor:${on?'pointer':'not-allowed'};background:${on?'rgba(204,120,92,.92)':'rgba(60,52,42,.9)'};color:${on?'#fff':'#8b8172'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis`; }\n\n  startGame(){\n    const decks=this.decks();\n    const hd=decks.find(d=>d.id===this.state.setupHuman)||decks[0];\n    const od=decks.find(d=>d.id===this.state.setupOpp)||decks[0];\n    if(!hd||!od){ this.setState({err:'No usable decks found. Build a deck in the dashboard first.'}); return; }\n    const you=this.mkPlayer('You', hd.cards);\n    const opp=this.mkPlayer(od.label.split(' · ')[0]||'Opponent', od.cards);\n    if(you.deck.length+you.hand.length < 10 || opp.deck.length+opp.hand.length < 10){\n      this.setState({err:'A deck had too few recognised cards. Pick a fuller deck.'}); return; }\n    const G={ players:[you,opp], active:0, first:0, turn:1, log:[], winner:null, challenger:null,\n      phase:'mulligan', mullSel:{},\n      banner:'Opening hand — select cards to put back and redraw, then keep your hand.' };\n    this.logMsg(G,'Game start. Alter your opening hand.','info');\n    this.commit(G);\n  }\n  toggleMull(uid){\n    const G=this.clone(this.state.G); if(!G||G.phase!=='mulligan') return;\n    G.mullSel=G.mullSel||{}; if(G.mullSel[uid]) delete G.mullSel[uid]; else G.mullSel[uid]=true;\n    this.commit(G);\n  }\n  botMulligan(p){\n    // redraw cards you can't reasonably cast early: cost >=6, keep at least one 1-2 drop\n    const sel=[]; const low=p.hand.filter(c=>c.c<=2).length;\n l=kws.length?kws.join(' · '):'';\n    return {\n      uid:c.uid, name:c.n, cost:c.c, lore:(c.l!=null?c.l:0), sw:swBase,\n      style, costStyle, tagStyle, tag:tag.t, kwLabel, hasKw:kws.length>0,\n      kwStyle:\"font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.02em;color:#C9A86A;line-height:1.1;margin-top:1px\",\n    };\n  }\n\n  renderVals(){\n    const decks=this.decks();\n    const G=this.state.G;\n    const dList=decks.map(d=>({id:d.id,label:d.label}));\n\n    // SETUP\n    const setup={\n      show:!G, decks:dList,\n      humanId:this.state.setupHuman, oppId:this.state.setupOpp,\n      onHuman:(e)=>this.setState({setupHuman:e.target.value}),\n      onOpp:(e)=>this.setState({setupOpp:e.target.value}),\n      onStart:()=>this.startGame(),\n      hint:this.state.err||(dList.length?'Decks load from your dashboard. First to 20 lore wins.':'No decks found — build one in the dashboard.')\n    };\n\n    if(!G){\n      return { setup, game:{show:false}, onNewGame:()=>this.setState({G:null}) };\n    }\n\n    const you=G.players[0], opp=G.players[1];\n    const av=this.inkAvail(you);\n    const pend=G.pending;\n    const mkPlay=(p, mine)=> p.play.map(c=>{\n      const ready = c.t==='Character' && !c.sick && !c.exerted;\n      // is this a legal target right now?\n      let targetable=false;\n      if(!mine){ targetable = (G.challenger!=null && c.t==='Character' && c.exerted) || (pend && (pend.targetSide==='any') ); }\n      else { targetable = !!(pend && pend.targetSide==='mine'); }\n      const selected = (mine && (G.challenger===c.uid || (pend&&pend.uid===c.uid)));\n      const v=this.viewCard(c, {mine, clickable: mine? ready : targetable, selectable:true, selected});\n      v.targetable=targetable;\n      v.img=this.cardImg(c); v.noImg=!v.img;\n      v.onClick = mine ? (()=>this.humanCardClick('you',c.uid)) : (()=>this.humanCardClick('foe',c.uid));\n      if(!mine){ v.onEnter=()=>this.setPrev(c); v.onLeave=()=>this.clearPrev(); }\n      if(mine){\n        const abis=this.parseAbilities(c);\n        v.focused = this.state.focusUid===c.uid;\n        v.canAct = ready;\n        v.onEnter=()=>{ this.setFocus(c.uid); this.setPrev(c); };\n        v.onLeave=()=>this.clearPrev();\n        v.onQuest=()=>this.humanQuest(c.uid);\n        v.onChallenge=()=>this.startChallenge(c.uid);\n        v.questStyle=this.menuBtn(ready);\n        v.chalStyle=this.menuBtn(ready);\n        v.abils=abis.map((a,i)=>({label:a.name.length>14?a.name.slice(0,13)+'…':a.name, key:(i+1), title:a.effect, onClick:()=>this.activateAbility(c.uid,i), style:this.menuBtn(ready&&a.supported&&this.inkAvail(you)>=(a.inkCost||0))}));\n        v.hasAbils=abis.length>0;\n        v.showMenu = v.focused && ready;\n      }\n      return v;\n    });\n\n    const youHand=you.hand.map(c=>{\n      const dot=this.INKDOT[c.i]||'#8A97A6';\n      const canPlay=av>=c.c; const canInk=this.effInk(c.key,c.ik)===1&&!you.inkedThisTurn;\n      const costStyle=`position:absolute;top:-7px;left:-6px;width:22px;height:22px;border-radius:50%;background:${dot};color:#12100E;font-family:'Chakra Petch';font-weight:700;font-size:.74rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.4)`;\n      const line=c.t==='Character'?((c.s!=null?c.s:'–')+'⚔ '+(c.w!=null?c.w:'–')+'♥ ◆'+(c.l!=null?c.l:0)):c.t;\n      const img=this.cardImg(c);\n      return {\n        uid:c.uid, name:c.n, cost:c.c, line, costStyle, img, noImg:!img,\n        onEnter:()=>this.setPrev(c), onLeave:()=>this.clearPrev(),\n        wrapStyle:'flex:0 0 auto;width:104px;display:flex;flex-direction:column',\n        style:`position:relative;height:96px;display:flex;flex-direction:column;gap:4px;padding:8px;border-radius:11px;border:1px solid #322a20;background:#1E1912;color:#F1EBDD`,\n        playStyle:`flex:1;border:0;border-radius:8px;padding:6px 0;font-family:inherit;font-weight:700;font-size:.72rem;cursor:${canPlay?'pointer':'not-allowed'};background:${canPlay?'#CC785C':'#2a241d'};color:${canPlay?'#fff':'#6f6555'}`,\n        inkStyle:`flex:0 0 40px;border:1px solid ${canInk?'#4B84CB':'#2a241d'};border-radius:8px;padding:6px 0;font-family:inherit;font-weight:700;font-size:.72rem;cursor:${canInk?'pointer':'not-allowed'};background:transparent;color:${canInk?'#7FB3E8':'#6f6555'}`,\n        onPlay:()=>this.humanPlay(c.uid),\n        onInk:()=>this.humanInk(c.uid)\n      };\n    });\n\n    const logView=G.log.map(l=>{\n      const map={info:['#B4A88E','#1b1712'],draw:['#9ec7e8','#151d24'],ink:['#8fb0d8','#151b22'],play:['#d8b98f','#221a12'],quest:['#8fcf8a','#161f15'],chal:['#e79f8e','#241512'],bad:['#e88']};\n      const c=map[l.kind]||map.info;\n      return {text:l.text, color:c[0], bg:c[1]||'#1b1712'};\n    });\n\n    const yourTurn=G.active===0 && G.winner==null;\n    const game={\n      show:true, over:G.winner!=null,\n      turn:G.turn, phaseLabel: yourTurn?'your move':'resolving…',\n      banner:G.banner||'',\n      challenging:G.challenger!=null,\n      onCancelChallenge:()=>{ const g=this.clone(this.state.G); g.challenger=null; g.banner='Attack cancelled.'; this.commit(g); },\n      onEndTurn:()=>this.endTurn(),\n      endLabel: yourTurn?'End turn ▸':'…',\n      endStyle:`border:0;border-radius:10px;padding:8px 16px;font-family:inherit;font-weight:700;font-size:.82rem;cursor:${yourTurn?'pointer':'not-allowed'};background:${yourTurn?'#3E7D57':'#2a241d'};color:${yourTurn?'#fff':'#6f6555'}`,\n      opp:{ name:opp.name, dot:this.INKDOT[opp.play[0]&&opp.play[0].i]||'#8A97A6', lore:opp.lore, loreColor:opp.lore>=14?'#e79f8e':'#F1EBDD',\n        hand:opp.hand.length, deck:opp.deck.length, ink:opp.inkwell.length, empty:opp.play.length===0, play:mkPlay(opp,false) },\n      you:{ name:you.name, dot:'#7FB3E8', lore:you.lore, loreColor:you.lore>=14?'#8fcf8a':'#F1EBDD',\n        deck:you.deck.length, empty:you.play.length===0, play:mkPlay(you,true),\n        inkAvail:av, inkTotal:you.inkwell.length,\n        inkedColor: you.inkedThisTurn?'#6f6555':'#7FB3E8', inkedLabel: you.inkedThisTurn?'inked this turn':'can ink 1 card',\n        handCount:you.hand.length, handEmpty:you.hand.length===0, hand:youHand },\n      log:logView,\n      winTitle: G.winner===0?'You win':'Opponent wins',\n      winColor: G.winner===0?'#8fcf8a':'#e79f8e',\n      winSub: (G.winner===0?you.lore:opp.lore)+' lore reached in '+G.turn+' turns.'\n    };\n\n    const pv=this.state.preview;\n    game.preview = pv? {show:true, ...pv} : {show:false};\n\n    // Mulligan overlay\n    const mullOn = G.phase==='mulligan';\n    game.boardActive = !mullOn;\n    const selCount = mullOn ? Object.keys(G.mullSel||{}).length : 0;\n    game.mulligan = mullOn ? {\n      show:true,\n      cards: you.hand.map(c=>{\n        const sel=!!(G.mullSel&&G.mullSel[c.uid]);\n        const dot=this.INKDOT[c.i]||'#8A97A6';\n        return { uid:c.uid, name:c.n, img:this.cardImg(c), noImg:!this.cardImg(c), sel,\n          onToggle:()=>this.toggleMull(c.uid), onEnter:()=>this.setPrev(c), onLeave:()=>this.clearPrev(),\n          badge: sel?'REDRAW':'KEEP', badgeStyle:`position:absolute;top:6px;left:6px;font-family:'Space Mono',monospace;font-size:.54rem;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:999px;background:${sel?'#B3232C':'#3E7D57'};color:#fff;z-index:2`,\n          style:`position:relative;flex:0 0 auto;width:118px;aspect-ratio:5/7;border-radius:12px;overflow:hidden;cursor:pointer;background:#0d0b09;border:2px solid ${sel?'#B3232C':'#3a342b'};opacity:${sel?0.72:1};transition:.12s` };\n      }),\n      count:selCount,\n      confirmLabel: selCount? ('Redraw '+selCount+' & keep') : 'Keep all 7',\n      onConfirm:()=>this.confirmMulligan()\n    } : {show:false};\n\n    return { setup:{show:false, decks:dList}, game, onNewGame:()=>{ try{localStorage.removeItem(this.GKEY);}catch(e){} this.setState({G:null, preview:null, focusUid:null}); } };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
